esphome:
  name: radio-analyzer-node
  friendly_name: ESPHome Radio Analyzer

esp32:
  board: esp32dev
  framework:
    type: arduino

# --- CONFIGURATION RÉSEAU (À ADAPTER EN LOCAL) ---
wifi:
  ssid: "TON_SSID_WIFI"
  password: "TON_MOT_DE_PASSE"
  
  ap:
    ssid: "Radio-Analyzer-Fallback"
    password: "analyzer_fallback"

web_server:
  port: 80

api:

ota:
  - platform: esphome

logger:
  level: INFO

# --- IMPORTATION DU COMPOSANT DEPUIS GITHUB ---
external_components:
  - source:
      type: git
      url: https://github.com/Azlahan/esphome-radio-analyzer
      ref: main
      path: components
    components: [ radio_analyzer ]

# --- CONFIGURATION MATÉRIELLE LILYGO LORA32 T3 V1.6.1 ---

spi:
  clk_pin: GPIO5
  mosi_pin: GPIO27
  miso_pin: GPIO19

i2c:
  sda: GPIO21
  scl: GPIO22

# Configuration du module de réception radio SX1278 (433 MHz)
sx127x:
  id: my_sx1278
  cs_pin: GPIO18
  rst_pin: GPIO23
  dio0_pin: GPIO26
  frequency: 433.92 MHz
  modulation: FSK
  bitsync: true
  packet_mode: true

# Configuration de l'analyseur
radio_analyzer:
  id: my_analyzer
  radio_id: my_sx1278
  rssi:
    id: radio_rssi
    name: "Force du signal (RSSI)"
  snr:
    id: radio_snr
    name: "Rapport signal/bruit (SNR)"

# --- AFFICHAGE SUR L'ÉCRAN OLED EMBARQUÉ (128x64) ---
font:
  - file: "gfonts://Roboto"
    id: roboto_font
    size: 11

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      it.printf(0, 0, id(roboto_font), "Radio Analyzer 433Mhz");
      it.draw_line(0, 14, 127, 14);
      
      if (id(radio_rssi).has_state()) {
        it.printf(0, 18, id(roboto_font), "RSSI: %.0f dBm", id(radio_rssi).state);
        
        // Jauge visuelle dynamique du RSSI
        float raw_rssi = id(radio_rssi).state;
        int bar_width = map(raw_rssi, -120, -30, 0, 120);
        bar_width = constrain(bar_width, 0, 120);
        it.draw_rectangle(0, 32, 120, 8);
        it.filled_rectangle(0, 32, bar_width, 8);
      } else {
        it.printf(0, 18, id(roboto_font), "En attente de signal...");
      }

      if (id(radio_snr).has_state()) {
        it.printf(0, 45, id(roboto_font), "SNR: %.1f dB", id(radio_snr).state);
      }
